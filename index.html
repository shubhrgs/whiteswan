<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhiteSwan AI - Real‑time Reasoning</title>
    <style>
        /* (same styles as before – keep them) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .app {
            max-width: 1200px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #e0e0e0, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            margin: 20px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }
        .message-content {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 24px;
            line-height: 1.5;
        }
        .user .message-content {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-bottom-right-radius: 4px;
        }
        .assistant .message-content {
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }
        .reasoning {
            background: rgba(241, 196, 15, 0.1);
            border-left: 3px solid #f1c40f;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #f1c40f;
        }
        .reasoning-label {
            font-weight: bold;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .reasoning-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .response-text {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .thinking-placeholder {
            color: #aaa;
            font-style: italic;
            margin-bottom: 8px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .input-area {
            display: flex;
            gap: 12px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        textarea {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
        }
        button {
            padding: 14px 32px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover:not(:disabled) { transform: scale(1.02); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .clear-btn {
            background: rgba(231, 76, 60, 0.2);
            padding: 8px 20px;
            border: none;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
        }
        .status {
            font-size: 0.8rem;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
        }
        .status-dot.streaming {
            background: #f1c40f;
            animation: pulse 1s infinite;
        }
        .cursor {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .model-info {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>🦢 WhiteSwan AI Agent</h1>
            <div class="badge-container">
                <span class="badge">🧠 NVIDIA Nemotron 3 Super</span>
                <span class="badge">⚡ Real‑time Reasoning</span>
                <span class="badge">☁️ Cloudflare Worker</span>
            </div>
        </header>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="message-content">
                    👋 Hi! I'm WhiteSwan. I'll show my reasoning step‑by‑step as I think.<br>
                    Ask me anything!
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Ready</span>
            </div>
            <button class="clear-btn" onclick="clearConversation()">🗑️ Clear Chat</button>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="Ask WhiteSwan..." rows="2"></textarea>
            <button id="sendBtn" onclick="sendMessage()">Send ✨</button>
        </div>
        <div class="model-info">nvidia/nemotron-3-super-120b-a12b • Streaming reasoning word‑by‑word</div>
    </div>

    <script>
        const API_BASE = 'https://whiteswan.shubhrgs.workers.dev';
        const SYSTEM_PROMPT = "You are WhiteSwan, a helpful AI assistant powered by NVIDIA Nemotron 3 Super. Show your step-by-step reasoning when appropriate.";
        
        let messages = [];
        let isStreaming = false;

        function initConversation() {
            if (messages.length === 0) {
                messages.push({ role: "system", content: SYSTEM_PROMPT });
            }
        }

        // Force a repaint by yielding to the event loop
        async function yieldToUI() {
            await new Promise(resolve => setTimeout(resolve, 0));
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message || isStreaming) return;
            
            input.value = '';
            isStreaming = true;
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            statusDot.classList.add('streaming');
            statusText.innerHTML = 'WhiteSwan is thinking...';
            
            addMessage(message, 'user');
            messages.push({ role: "user", content: message });
            
            const assistantDiv = addMessage('', 'assistant', true);
            const contentDiv = assistantDiv.querySelector('.message-content');
            contentDiv.innerHTML = '<div class="thinking-placeholder">💭 WhiteSwan is thinking <span class="cursor">▊</span></div><div class="response-text" style="display:none;"></div>';
            const thinkingDiv = contentDiv.querySelector('.thinking-placeholder');
            const responseDiv = contentDiv.querySelector('.response-text');
            
            let reasoningDiv = null;
            let reasoningContentElem = null;
            let fullResponse = '';
            let firstReasoning = true;
            
            try {
                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: messages,
                        temperature: 0.7,
                        enable_reasoning: true
                    })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        // Skip heartbeat comments
                        if (line.startsWith(': ')) continue;
                        
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') continue;
                            try {
                                const data = JSON.parse(dataStr);
                                
                                if (data.reasoning) {
                                    // On first reasoning chunk, hide thinking placeholder and create reasoning box
                                    if (firstReasoning) {
                                        firstReasoning = false;
                                        if (thinkingDiv) thinkingDiv.style.display = 'none';
                                        responseDiv.style.display = 'block';
                                        await yieldToUI(); // Immediate repaint
                                        
                                        reasoningDiv = document.createElement('div');
                                        reasoningDiv.className = 'reasoning';
                                        reasoningDiv.innerHTML = `
                                            <div class="reasoning-label" onclick="toggleReasoning(this)">
                                                💭 Reasoning (click to toggle)
                                            </div>
                                            <div class="reasoning-content"></div>
                                        `;
                                        contentDiv.insertBefore(reasoningDiv, responseDiv);
                                        reasoningContentElem = reasoningDiv.querySelector('.reasoning-content');
                                        await yieldToUI(); // Ensure box is painted
                                    }
                                    
                                    reasoningContentElem.textContent += data.reasoning;
                                    autoScroll();
                                    await yieldToUI(); // Show each word as it arrives
                                }
                                
                                if (data.content) {
                                    if (firstReasoning && thinkingDiv) {
                                        thinkingDiv.style.display = 'none';
                                        responseDiv.style.display = 'block';
                                        await yieldToUI();
                                        firstReasoning = false;
                                    }
                                    fullResponse += data.content;
                                    responseDiv.textContent = fullResponse;
                                    autoScroll();
                                    await yieldToUI(); // Stream final answer word by word
                                }
                                
                                if (data.error) {
                                    responseDiv.textContent = `⚠️ Error: ${data.error}`;
                                    responseDiv.style.display = 'block';
                                    if (thinkingDiv) thinkingDiv.style.display = 'none';
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                // Clean up
                if (thinkingDiv) thinkingDiv.remove();
                const cursor = contentDiv.querySelector('.cursor');
                if (cursor) cursor.remove();
                
                if (!fullResponse && !reasoningDiv) {
                    responseDiv.textContent = 'No response received. The API may be rate-limited.';
                    responseDiv.style.display = 'block';
                }
                
                if (fullResponse) {
                    messages.push({ role: "assistant", content: fullResponse });
                }
                if (messages.length > 30) {
                    messages = [messages[0], ...messages.slice(-29)];
                }
                
            } catch (error) {
                console.error('Fetch error:', error);
                contentDiv.innerHTML = `<em>⚠️ Network error: ${error.message}</em>`;
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
                statusDot.classList.remove('streaming');
                statusText.innerHTML = 'Ready';
                document.getElementById('userInput').focus();
            }
        }
        
        function toggleReasoning(labelElement) {
            const reasoningDiv = labelElement.parentElement;
            const content = reasoningDiv.querySelector('.reasoning-content');
            if (content.style.display === 'none') {
                content.style.display = 'block';
                labelElement.innerHTML = '💭 Reasoning (click to toggle)';
            } else {
                content.style.display = 'none';
                labelElement.innerHTML = '💭 Reasoning (click to show)';
            }
        }
        
        function autoScroll() {
            const chatArea = document.getElementById('chatArea');
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function addMessage(content, role, isPlaceholder = false) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            if (!isPlaceholder) {
                contentDiv.textContent = content;
            }
            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            autoScroll();
            return messageDiv;
        }
        
        function clearConversation() {
            if (confirm('Clear conversation history?')) {
                messages = [];
                initConversation();
                const chatArea = document.getElementById('chatArea');
                chatArea.innerHTML = `
                    <div class="message assistant">
                        <div class="message-content">🧹 Conversation cleared. How can I help?</div>
                    </div>
                `;
            }
        }
        
        initConversation();
        document.getElementById('userInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
