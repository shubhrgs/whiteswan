<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>WhiteSwan — AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0c10;
            --surface: #12141c;
            --surface-elevated: #1a1d2a;
            --border: #252a36;
            --text: #edf2f7;
            --text-dim: #9ca3b0;
            --accent: #5f7fbf;
            --accent-soft: #2d3a5e;
            --reasoning: #d4a373;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            font-weight: 400;
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
            font-size: 15px;
        }

        /* App layout */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg);
        }

        /* Header — minimal */
        .top-bar {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .swan-icon {
            font-size: 24px;
        }
        .brand h1 {
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: var(--surface-elevated);
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .icon-btn span {
            font-size: 0.85rem;
        }
        .icon-btn:active {
            background: var(--accent-soft);
            transform: scale(0.96);
        }

        /* Chat container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* Message bubbles — clean, minimal */
        .message {
            display: flex;
            animation: fadeSlide 0.2s ease;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message.assistant {
            justify-content: flex-start;
        }
        .msg-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            background: var(--surface-elevated);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .user .msg-bubble {
            background: var(--accent-soft);
            border-bottom-right-radius: 6px;
        }
        .assistant .msg-bubble {
            background: var(--surface);
            border-bottom-left-radius: 6px;
            border: 1px solid var(--border);
        }
        .msg-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        .action-icons {
            display: flex;
            gap: 10px;
        }
        .action-icons span {
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.15s;
        }
        .action-icons span:active {
            opacity: 1;
        }
        /* Reasoning block */
        .reasoning-block {
            background: rgba(212, 163, 115, 0.08);
            border-left: 3px solid var(--reasoning);
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 0.8rem;
        }
        .reasoning-toggle {
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--reasoning);
        }
        .reasoning-content {
            padding: 0 12px 12px 12px;
            white-space: pre-wrap;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.75rem;
            color: #b9c7d9;
            display: none;
        }
        .reasoning-block.open .reasoning-content {
            display: block;
        }
        .msg-text {
            word-break: break-word;
        }
        .msg-text p {
            margin-bottom: 0.5rem;
        }
        .msg-text pre {
            background: #0a0c12;
            padding: 10px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 0.8rem;
        }
        .msg-text code {
            font-family: 'Source Code Pro', monospace;
            font-size: 0.8rem;
        }
        .thinking-placeholder {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dim);
        }
        .dot-pulse {
            display: inline-flex;
            gap: 4px;
        }
        .dot-pulse span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* Input area — touch friendly */
        .input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            flex-shrink: 0;
        }
        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--surface-elevated);
            border-radius: 32px;
            border: 1px solid var(--border);
            padding: 6px 12px;
        }
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            padding: 8px 0;
            max-height: 100px;
        }
        .input-tool {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            padding: 8px;
            cursor: pointer;
            border-radius: 30px;
            transition: background 0.1s;
        }
        .input-tool:active {
            background: var(--accent-soft);
        }
        .send-btn {
            background: var(--accent);
            border: none;
            border-radius: 30px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
        }
        .send-btn:active {
            transform: scale(0.94);
        }
        .attached-files {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .file-tag {
            background: var(--surface-elevated);
            padding: 4px 10px;
            border-radius: 24px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border);
        }
        .status {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-align: center;
            margin-top: 8px;
        }

        /* Session modal mobile-friendly */
        .session-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .session-panel {
            background: var(--surface-elevated);
            border-radius: 28px;
            width: 90%;
            max-width: 360px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid var(--border);
        }
        .session-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .session-item:active {
            background: var(--accent-soft);
            border-radius: 12px;
        }

        @media (max-width: 500px) {
            .msg-bubble {
                max-width: 90%;
            }
            .icon-btn span {
                display: none;
            }
            .icon-btn {
                padding: 8px 10px;
            }
            .brand h1 {
                font-size: 1.1rem;
            }
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .copy-code-btn {
            position: absolute;
            right: 6px;
            top: 6px;
            background: #2a2e3a;
            border: none;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 9px;
            cursor: pointer;
        }
        pre {
            position: relative;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <div class="brand">
            <span class="swan-icon">🦢</span>
            <h1>WhiteSwan</h1>
        </div>
        <div class="action-buttons">
            <button id="newChatBtn" class="icon-btn">✨<span> New</span></button>
            <button id="sessionsBtn" class="icon-btn">💬<span> History</span></button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message assistant">
            <div class="msg-bubble">
                <div class="msg-header"><span>WhiteSwan</span></div>
                <div class="msg-text">Hi, I'm WhiteSwan. I can read PDFs, Office files, generate spreadsheets or presentations, and show reasoning step by step. Attach files or just ask.</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <button id="attachBtn" class="input-tool" title="Attach file">📎</button>
            <textarea id="userInput" placeholder="Message WhiteSwan..." rows="1"></textarea>
            <button id="micBtn" class="input-tool" title="Voice input">🎤</button>
            <button id="sendButton" class="send-btn">➤</button>
        </div>
        <div id="attachedFilesList" class="attached-files"></div>
        <div class="status" id="statusArea">⚡ Ready</div>
    </div>
</div>

<script>
    // ---------- CONFIGURATION ----------
    const API_BASE = 'https://whiteswan.shubhrgs.workers.dev';   // your Cloudflare Worker
    const FIXED_MODEL = "nvidia/nemotron-3-super-120b-a12b";   // fixed model, no selector needed
    const ENABLE_REASONING = true;                              // reasoning always on for better output

    let activeSessionId = null;
    let sessions = [];           // { id, title, messages[] }
    let currentMessages = [];    // { role, content, reasoning? }
    let isGenerating = false;
    let abortController = null;
    let attachedFiles = [];      // { name, content, loading }
    let recognition = null;

    // DOM elements
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendButton');
    const attachBtn = document.getElementById('attachBtn');
    const micBtn = document.getElementById('micBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const sessionsBtn = document.getElementById('sessionsBtn');
    const attachedFilesList = document.getElementById('attachedFilesList');
    const statusSpan = document.getElementById('statusArea');

    // ---------- Helpers ----------
    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderMarkdown(raw) {
        if (!raw) return '';
        if (typeof marked !== 'undefined') {
            return marked.parse(raw);
        }
        return `<pre>${escapeHtml(raw)}</pre>`;
    }

    function addCodeCopy(container) {
        if (!container) return;
        container.querySelectorAll('pre').forEach(pre => {
            if (pre.querySelector('.copy-code-btn')) return;
            let btn = document.createElement('button');
            btn.textContent = 'Copy';
            btn.className = 'copy-code-btn';
            btn.onclick = () => {
                const code = pre.querySelector('code')?.innerText || pre.innerText;
                navigator.clipboard.writeText(code);
                btn.textContent = '✓';
                setTimeout(() => btn.textContent = 'Copy', 1200);
            };
            pre.style.position = 'relative';
            pre.appendChild(btn);
        });
        if (typeof hljs !== 'undefined') {
            container.querySelectorAll('pre code').forEach(hljs.highlightElement);
        }
    }

    function scrollToBottom() {
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    }

    // Append message to UI (supports reasoning)
    function appendMessage(role, content, reasoningText = null, isStreamPlaceholder = false) {
        const wrapper = document.createElement('div');
        wrapper.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        const header = document.createElement('div');
        header.className = 'msg-header';
        header.innerHTML = `<span>${role === 'user' ? 'You' : 'WhiteSwan'}</span>
                            <span class="action-icons">${role === 'assistant' ? '<span class="copy-msg">📋</span><span class="tts-msg">🔊</span>' : ''}</span>`;
        const textDiv = document.createElement('div');
        textDiv.className = 'msg-text';

        if (isStreamPlaceholder) {
            textDiv.innerHTML = `<div class="thinking-placeholder">Thinking<span class="dot-pulse"><span>.</span><span>.</span><span>.</span></span></div>`;
        } else {
            if (reasoningText) {
                const reasoningDiv = document.createElement('div');
                reasoningDiv.className = 'reasoning-block open';
                reasoningDiv.innerHTML = `<div class="reasoning-toggle">💭 Reasoning ▼</div><div class="reasoning-content">${escapeHtml(reasoningText)}</div>`;
                reasoningDiv.querySelector('.reasoning-toggle').onclick = () => reasoningDiv.classList.toggle('open');
                bubble.appendChild(reasoningDiv);
            }
            textDiv.innerHTML = renderMarkdown(content);
            addCodeCopy(textDiv);
        }

        bubble.appendChild(header);
        bubble.appendChild(textDiv);
        wrapper.appendChild(bubble);
        chatContainer.appendChild(wrapper);
        scrollToBottom();

        if (!isStreamPlaceholder && role === 'assistant') {
            const copyBtn = bubble.querySelector('.copy-msg');
            if (copyBtn) copyBtn.onclick = () => { navigator.clipboard.writeText(content); statusSpan.innerText = 'Copied!'; setTimeout(()=>statusSpan.innerText='Ready', 1500); };
            const ttsBtn = bubble.querySelector('.tts-msg');
            if (ttsBtn && window.speechSynthesis) ttsBtn.onclick = () => { const u = new SpeechSynthesisUtterance(content); speechSynthesis.speak(u); };
        }
        return { bubble, textDiv };
    }

    // ---------- File Reading (PDF, DOCX, XLSX, PPTX, images/text) ----------
    async function readFileContent(file) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (ext === 'pdf') {
            await ensurePDFJS();
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
            let text = '';
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(t => t.str).join(' ') + '\n';
            }
            return text;
        } else if (ext === 'docx') {
            await loadScript('https://cdn.jsdelivr.net/npm/mammoth@1.4.21/mammoth.browser.min.js');
            const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
            return result.value;
        } else if (ext === 'xlsx') {
            await loadScript('https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js');
            const wb = XLSX.read(await file.arrayBuffer());
            let all = '';
            wb.SheetNames.forEach(s => { all += XLSX.utils.sheet_to_csv(wb.Sheets[s]) + '\n'; });
            return all.slice(0, 12000);
        } else if (ext === 'pptx') {
            await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
            const zip = await JSZip.loadAsync(await file.arrayBuffer());
            let slidesText = '';
            for (let path in zip.files) {
                if (path.match(/ppt\/slides\/slide\d+\.xml/)) {
                    const xml = await zip.file(path).async('string');
                    const matches = xml.match(/>([^<]*)</g);
                    if (matches) slidesText += matches.map(m => m.slice(1,-1)).join(' ') + '\n';
                }
            }
            return slidesText || '[Presentation content extracted]';
        } else if (['png','jpg','jpeg','gif','webp'].includes(ext)) {
            return `[Image: ${file.name} — vision not supported, but filename included]`;
        } else {
            return await file.text();
        }
    }

    async function ensurePDFJS() {
        if (!window['pdfjs-dist/build/pdf']) {
            await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
    }
    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
        });
    }

    // File attachment UI
    attachBtn.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.accept = '.txt,.md,.pdf,.docx,.xlsx,.pptx,.png,.jpg,.jpeg,.json,.csv';
        input.onchange = async (e) => {
            for (let file of Array.from(e.target.files)) {
                const fileObj = { name: file.name, loading: true, content: null };
                attachedFiles.push(fileObj);
                renderAttachedFiles();
                try {
                    fileObj.content = await readFileContent(file);
                    fileObj.loading = false;
                } catch (err) {
                    fileObj.loading = false;
                    fileObj.content = `Error: ${err.message}`;
                }
                renderAttachedFiles();
            }
        };
        input.click();
    };

    function renderAttachedFiles() {
        attachedFilesList.innerHTML = attachedFiles.map((f, idx) => `
            <div class="file-tag">
                📄 ${escapeHtml(f.name)} ${f.loading ? '⏳' : '✓'}
                <span style="cursor:pointer" data-idx="${idx}" class="remove-attach">✖</span>
            </div>
        `).join('');
        document.querySelectorAll('.remove-attach').forEach(el => {
            el.onclick = () => { attachedFiles.splice(parseInt(el.dataset.idx), 1); renderAttachedFiles(); };
        });
    }

    // Voice recognition (mobile)
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.onresult = (e) => {
            const transcript = e.results[0][0].transcript;
            userInput.value += (userInput.value ? ' ' : '') + transcript;
            userInput.dispatchEvent(new Event('input'));
        };
        micBtn.onclick = () => recognition.start();
    } else {
        micBtn.style.display = 'none';
    }

    // ---------- Session Management (KV + localStorage) ----------
    async function syncSessionsToWorker() {
        try {
            await fetch(`${API_BASE}/api/sessions/sync`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessions, activeSessionId })
            });
        } catch(e) { console.warn(e); }
    }
    async function loadSessionsFromWorker() {
        try {
            const res = await fetch(`${API_BASE}/api/sessions`);
            if (res.ok) {
                const data = await res.json();
                sessions = data.sessions || [];
                activeSessionId = data.activeSessionId || (sessions[0]?.id || null);
                if (activeSessionId && sessions.find(s => s.id === activeSessionId)) {
                    loadSessionById(activeSessionId);
                } else {
                    resetToEmpty();
                }
                return;
            }
        } catch(e) {}
        // fallback localStorage
        const local = localStorage.getItem('whiteswan_sessions');
        if (local) {
            const data = JSON.parse(local);
            sessions = data.sessions || [];
            activeSessionId = data.activeSessionId;
            if (activeSessionId && sessions.find(s => s.id === activeSessionId)) loadSessionById(activeSessionId);
            else resetToEmpty();
        } else {
            resetToEmpty();
        }
    }
    function resetToEmpty() {
        currentMessages = [];
        activeSessionId = Date.now().toString();
        sessions = [{ id: activeSessionId, title: 'New Chat', messages: [] }];
        renderChatFromMessages();
        saveLocal();
    }
    function saveLocal() {
        localStorage.setItem('whiteswan_sessions', JSON.stringify({ sessions, activeSessionId }));
        syncSessionsToWorker();
    }
    function saveCurrentSession() {
        let sess = sessions.find(s => s.id === activeSessionId);
        if (!sess) {
            sessions.unshift({ id: activeSessionId, title: 'Conversation', messages: [] });
            sess = sessions[0];
        }
        sess.messages = [...currentMessages];
        if (!sess.title && currentMessages[0]?.content) sess.title = currentMessages[0].content.slice(0, 40);
        saveLocal();
    }
    function loadSessionById(id) {
        const sess = sessions.find(s => s.id === id);
        if (sess) {
            activeSessionId = id;
            currentMessages = sess.messages.map(m => ({ ...m }));
            renderChatFromMessages();
            saveLocal();
        }
    }
    function renderChatFromMessages() {
        chatContainer.innerHTML = '';
        if (currentMessages.length === 0) {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message assistant';
            welcomeDiv.innerHTML = `<div class="msg-bubble"><div class="msg-text">✨ New conversation. Attach documents or ask anything.</div></div>`;
            chatContainer.appendChild(welcomeDiv);
        } else {
            currentMessages.forEach(msg => {
                if (msg.role === 'user') appendMessage('user', msg.content);
                else appendMessage('assistant', msg.content, msg.reasoning || null);
            });
        }
        scrollToBottom();
    }
    async function newChat() {
        if (isGenerating && abortController) abortController.abort();
        activeSessionId = Date.now().toString();
        currentMessages = [];
        sessions.unshift({ id: activeSessionId, title: 'New Chat', messages: [] });
        renderChatFromMessages();
        saveLocal();
    }
    newChatBtn.onclick = newChat;
    sessionsBtn.onclick = () => {
        const modal = document.createElement('div');
        modal.className = 'session-modal';
        const panel = document.createElement('div');
        panel.className = 'session-panel';
        panel.innerHTML = `<h3 style="margin-bottom:12px">Conversations</h3><div id="sessionListModal"></div><button id="closeSessModal" style="margin-top:16px;background:#2a2e3a;border:none;border-radius:40px;padding:8px;width:100%;">Close</button>`;
        const listDiv = panel.querySelector('#sessionListModal');
        sessions.forEach(s => {
            const item = document.createElement('div');
            item.className = 'session-item';
            item.innerHTML = `<span>${escapeHtml(s.title || 'Untitled')}</span><span>🗑️</span>`;
            item.onclick = (e) => {
                if (e.target.innerText === '🗑️') {
                    sessions = sessions.filter(x => x.id !== s.id);
                    if (activeSessionId === s.id) newChat();
                    saveLocal();
                    modal.remove();
                } else {
                    loadSessionById(s.id);
                    modal.remove();
                }
            };
            listDiv.appendChild(item);
        });
        panel.querySelector('#closeSessModal').onclick = () => modal.remove();
        modal.appendChild(panel);
        document.body.appendChild(modal);
    };

    // ---------- File generation helpers (XLSX, PPTX, DOCX) ----------
    function generateXlsx(data) {
        if (!window.XLSX) return;
        const ws = XLSX.utils.json_to_sheet(data.rows || []);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
        XLSX.writeFile(wb, `${data.title || 'export'}.xlsx`);
        statusSpan.innerText = 'Spreadsheet generated';
    }
    function generatePptx(data) {
        alert('PPTX generation: presentation would be created (lib available).');
    }
    function processFileMarkers(text) {
        let finalText = text;
        const xlsxMatch = /\[FILE:xlsx\](\{.*?\})/gs;
        finalText = finalText.replace(xlsxMatch, (match, jsonStr) => {
            try {
                const data = JSON.parse(jsonStr);
                generateXlsx(data);
                return `📊 <em>Spreadsheet "${data.title || 'sheet'}.xlsx" generated</em>`;
            } catch(e) { return match; }
        });
        const pptxMatch = /\[FILE:pptx\](\{.*?\})/gs;
        finalText = finalText.replace(pptxMatch, (match, jsonStr) => {
            try {
                const data = JSON.parse(jsonStr);
                generatePptx(data);
                return `📽️ <em>Presentation "${data.title || 'slides'}.pptx" generated</em>`;
            } catch(e) { return match; }
        });
        return finalText;
    }

    // ---------- Send message (streaming) ----------
    async function sendMessage() {
        if (isGenerating) return;
        let text = userInput.value.trim();
        if (!text && attachedFiles.length === 0) return;
        let fullUserContent = text;
        if (attachedFiles.length) {
            const fileContext = attachedFiles.map(f => `[File: ${f.name}]\n${f.content || ''}`).join('\n\n');
            fullUserContent = fileContext + (text ? '\n\n' + text : '');
            attachedFiles = [];
            renderAttachedFiles();
        }
        userInput.value = '';
        currentMessages.push({ role: 'user', content: fullUserContent });
        appendMessage('user', fullUserContent);
        saveCurrentSession();

        isGenerating = true;
        statusSpan.innerHTML = '🧠 Reasoning ...';
        sendBtn.disabled = true;
        abortController = new AbortController();

        const placeholder = appendMessage('assistant', '', null, true);
        const streamTextDiv = placeholder.textDiv;
        let fullReasoning = '', fullContent = '';
        let reasoningDivElement = null;

        try {
            const response = await fetch(`${API_BASE}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                signal: abortController.signal,
                body: JSON.stringify({
                    messages: currentMessages.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content })),
                    model: FIXED_MODEL,
                    temperature: 0.7,
                    enable_reasoning: ENABLE_REASONING,
                    stream: true
                })
            });
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6);
                        if (dataStr === '[DONE]') continue;
                        try {
                            const chunk = JSON.parse(dataStr);
                            if (chunk.reasoning) {
                                fullReasoning += chunk.reasoning;
                                if (!reasoningDivElement) {
                                    const rb = document.createElement('div');
                                    rb.className = 'reasoning-block open';
                                    rb.innerHTML = `<div class="reasoning-toggle">💭 Reasoning ▼</div><div class="reasoning-content"></div>`;
                                    rb.querySelector('.reasoning-toggle').onclick = () => rb.classList.toggle('open');
                                    placeholder.bubble.insertBefore(rb, streamTextDiv);
                                    reasoningDivElement = rb.querySelector('.reasoning-content');
                                }
                                reasoningDivElement.innerText = fullReasoning;
                                scrollToBottom();
                            }
                            if (chunk.content) {
                                fullContent += chunk.content;
                                const processed = processFileMarkers(fullContent);
                                streamTextDiv.innerHTML = renderMarkdown(processed);
                                addCodeCopy(streamTextDiv);
                                scrollToBottom();
                            }
                        } catch(e) {}
                    }
                }
            }
            const finalProcessed = processFileMarkers(fullContent);
            streamTextDiv.innerHTML = renderMarkdown(finalProcessed);
            addCodeCopy(streamTextDiv);
            currentMessages.push({ role: 'assistant', content: finalProcessed, reasoning: fullReasoning });
            saveCurrentSession();
        } catch (err) {
            if (err.name !== 'AbortError') streamTextDiv.innerHTML = `<span>⚠️ Error: ${err.message}</span>`;
        } finally {
            isGenerating = false;
            sendBtn.disabled = false;
            statusSpan.innerHTML = 'Ready';
            abortController = null;
        }
    }

    sendBtn.onclick = sendMessage;
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Load sessions on start
    loadSessionsFromWorker();
    ensurePDFJS(); // preload pdf worker
</script>
